name: Solr Core Creation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-solr-schema:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t my_solr_image .

    - name: Run Docker container
      run: docker run -d -p 8983:8983 -e SOLR_MODE=standalone --name adc my_solr_image solr

    - name: Wait for Solr readiness
      run: |
        for i in {1..30}; do
          if curl -fsS http://localhost:8983/solr/admin/info/system >/dev/null; then
            exit 0
          fi
          sleep 2
        done
        echo "Solr did not become ready in time"
        docker logs adc
        exit 1

    - name: Create Solr core
      run: |
        docker exec adc solr create -c adc -d /var/solr/data/configsets/adc || exit 1

    - name: Ingest test document
      run: |
        docker exec adc solr post -c adc -out -verbose /var/solr/data/configsets/adc/example_mmd_solr.json || exit 1
